[general]
# Accessor checks the exact AWS profile first. On failure it calls Granted's
# `assume --wait --export PROFILE` with the exact profile, never an ambiguous
# "latest". `--export` persists the newly granted session for later AWS/Boto
# processes; without it credentials only exist in Assume's temporary shell.
auto_request = true
request_command = ["assume", "--wait", "--export"]
command_timeout_seconds = 300
# Individual service-credential AWS operations are expected to finish within
# seconds. A shorter bound keeps one stalled target from delaying the rest.
project_command_timeout_seconds = 90
post_request_delay_seconds = 2

# Before every new proxy start, authenticate in the terminal with `sudo -v`,
# then flush DNS caches and reload PF using non-interactive sudo commands.
prepare_network_before_proxy = true

# sshuttle is independent from credential rotation. Check it every five minutes
# and restart the Accessor-managed tunnel only when it has exited or failed health checks.
sshuttle_check_seconds = 300

# Every five-minute sshuttle check calls these private endpoints without using
# any HTTP proxy. All failures means the tunnel is unhealthy and is restarted.
proxy_health_urls = [
  "https://fprcinv.fpr.stg-tvlk.cloud/healthcheck",
  "https://fprmfdt.fpr.stg-tvlk.cloud/healthcheck",
  "https://fprspdt.fpr.stg-tvlk.cloud/healthcheck",
]

# Used when no --project flag is supplied. `accessor projects` shows all names.
default_projects = ["fprpapi"]
default_proxy = "fprpapi"

[build_artifacts]
# Keep Gradle's CodeArtifact token synchronized with the build role. This is
# the Accessor equivalent of the shared projects' scripts/dev_login.sh.
enabled = true
role_name = "build-artifact-reader"
# Use the source build profile. The legacy `beiartf` profile is synchronized by
# the following gradle-beiartf role and may not exist at the first startup step.
profile = "BeiartfReader@tvlk-build-special"
region = "ap-southeast-1"
codeartifact_domain = "org-codeartifact-domain-015110552125-242c507c3f"
codeartifact_domain_owner = "015110552125"
gradle_property = "external_cache_codeartifact_token"
gradle_properties_path = "~/.gradle/gradle.properties"
# Used for `docker pull` / local image work. Docker login is best effort and
# does not mark an otherwise valid AWS build role as unavailable.
ecr_registry_ids = ["015110552125", "745412875337"]

[proxy]
# Shared Demand Proxy parameters.  These values came from the common project
# scripts; Accessor uses them directly and never imports a project checkout.
profile = "LocalStagingJumpRole@tvlk-fpr-stg"
service_name = "fprpapi"
parameter_mapping = "/tvlk-secret/fprprxy/fpr/demand/proxy-instance-mapping"
region = "ap-southeast-1"
exclude_cidr = "172.17.0.0/16"
subnets = ["172.16.0.0/12", "10.0.0.0/8", "192.168.0.0/16"]
ssh_user = "ubuntu"

[[roles]]
name = "build-artifact-reader"
profile = "BeiartfReader@tvlk-build-special"
refresh_seconds = 600
retry_seconds = 60
request_on_failure = true

[[roles]]
# fprdapi Gradle uses `systemProp.aws.profile=beiartf`. It is deliberately a
# separate status row from the Granted build role above.
name = "gradle-beiartf"
profile = "beiartf"
credential_source_profile = "BeiartfReader@tvlk-build-special"
refresh_seconds = 600
retry_seconds = 60
request_on_failure = false

[[roles]]
name = "local-staging-jump"
profile = "LocalStagingJumpRole@tvlk-fpr-stg"
refresh_seconds = 600
retry_seconds = 60
request_on_failure = true

# Add one [[projects]] table per AWS service target.  These entries contain
# metadata for AWS role discovery only; no local checkout is required.
[[projects]]
name = "fprpapi"
description = "fprpapi service credentials"
service_name = "fprpapi"
discovery_tag = "cluster"
discovery_value = "fprpapi-app"
session_name_mode = "caller"
session_name_prefix = "local_staging"
depends_on_role = "local-staging-jump"
credential_refresh_seconds = 2700

[[projects]]
name = "fprdapi"
description = "fprdapi service credentials"
service_name = "fprdapi"
ec2_cluster_tag = "fprdapi-app"
depends_on_role = "local-staging-jump"
credential_refresh_seconds = 2700

